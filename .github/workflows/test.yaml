name: CI

on:
  push:
    branches:
      - '**'
    tags-ignore:
      - 'v*'

jobs:
  test:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout 🛎️
        uses: actions/checkout@v4

      - name: pnpm 🧰
        uses: pnpm/action-setup@v4
        with:
          version: 10.x

      - name: Node 🧰
        uses: actions/setup-node@v4
        with:
          node-version: 24.x
          cache: 'pnpm'

      - name: Install 📦
        run: pnpm install

      - name: Lint 🔎
        run: pnpm -r run --if-present lint

      - name: Test 🐛
        run: pnpm -r run --if-present test

      - name: Build 🛠
        run: pnpm -r run --if-present build
